<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Border Radius Previewer</h1>
    </header>
    <main>
        <h2>Create a Preview for a conatainer</h2>

        <div class="container" id="container">
            <p>Container</p>
        </div>

        <div class="inputs">
            <div>
                <label for="tl">Top-left : </label>
                <input type="range" id="tl" max="150" min="0" value="0"/>
                <span id="tl-value">0px</span>
            </div>

            <div>
                <label for="tr">Top-right : </label>
                <input type="range" id="tr" value="0" max="150" min="0"/>
                <span id="tr-value">0px</span>
            </div>

            <div>
                <label for="br">Bottom-right : </label>
                <input type="range" id="bl" value="0" max="150" min="0"/>
                <span id="bl-value">0px</span>
            </div>

            <div>
                <label for="bl">Bottom-left : </label>
                <input type="range" id="br" value="0" max="150" min="0"/>
                <span id="br-value">0px</span>
            </div>

           
        </div>

    </main>
    <footer>&copy; Mohammed Sameer &bull; All rights reserved</footer>

    <script src="script.js"></script>
</body>
</html>
