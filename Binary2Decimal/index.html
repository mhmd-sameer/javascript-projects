<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles.css" rel="stylesheet">
    <script src="script.js"></script>
    
    <title>Document</title>
</head>
<body>
    <main>
        <h1>Binary to Decimal Convertor</h1>
        <label for="binary">Enter Binary Digits : </label>
        <input type="text" class="input-box" pattern="[01]{1,8}" id="binary" placeholder="up to 8 Digits" maxlength="8" size="8">

        <p>Result : <span id="result">0</span></p>
    </main>
</body>

</html>
